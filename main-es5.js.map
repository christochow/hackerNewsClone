export default "<div class=\"container\">\n  <table class=\"container-table\" align=\"center\">\n    <tbody style=\"display: table-row-group;vertical-align: middle;\">\n    <tr align=\"left\" style=\"background-color: rgb(255, 102, 0);\">\n      <table class=\"header\">\n        <tbody>\n        <tr style=\"height: 30px\">\n          <td style=\"vertical-align: bottom;\"><a routerLink=\"\" routerLinkActive=\"active\"><img alt=\"\" style=\"padding-left: 5px;\" src=\"assets/favicon.ico\"></a></td>\n          <td style=\"vertical-align: center;\">\n            <a style=\"padding-left: 5px;\" class=\"title\" routerLink=\"\" routerLinkActive=\"active\">Hacker News Clone</a>\n          </td>\n          <td style=\"vertical-align: center;\">\n              <a style=\"padding-left: 5px;padding-right: 5px\" routerLink=\"newest\" [ngClass]=\"isNewest?'active-link':''\" routerLinkActive=\"active\" [routerLinkActiveOptions]=\"{ exact: true }\">new</a>\n          </td>\n          <td style=\"vertical-align: center;\">|</td>\n          <td style=\"vertical-align: center;\">\n              <a style=\"padding-left: 5px;padding-right: 5px\" routerLink=\"ask\" [ngClass]=\"isAsk?'active-link':''\" routerLinkActive=\"active\" [routerLinkActiveOptions]=\"{ exact: true }\">ask</a>\n          </td>\n          <td style=\"vertical-align: center;\">|</td>\n          <td style=\"vertical-align: center;\">\n              <a style=\"padding-left: 5px;padding-right: 5px\" routerLink=\"show\" [ngClass]=\"isShow?'active-link':''\" routerLinkActive=\"active\" [routerLinkActiveOptions]=\"{ exact: true }\">show</a>\n          </td>\n          <td style=\"vertical-align: center;\">|</td>\n          <td style=\"vertical-align: center;\">\n            <a style=\"padding-left: 5px;padding-right: 5px\" routerLink=\"jobs\" [ngClass]=\"isJobs?'active-link':''\" routerLinkActive=\"active\" [routerLinkActiveOptions]=\"{ exact: true }\">jobs</a>\n          </td>\n          <td *ngIf=\"hasUser\" style=\"vertical-align: center;\">|</td>\n          <td *ngIf=\"hasUser\">\n            <div style=\"padding-left: 5px;padding-right: 5px;color: white\">\n              {{id+\"'s submissions\"}}\n            </div>\n          </td>\n        </tr>\n        </tbody>\n      </table>\n    </tr>\n    <tr class=\"separator-row\"><td></td></tr>\n    <router-outlet></router-outlet>\n    </tbody>\n  </table>\n</div>\n"
