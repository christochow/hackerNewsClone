export default "<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" border=\"0\" *ngIf=\"ready\">\n  <tbody>\n  <app-submission *ngFor=\"let s of user.submitted.slice(30*(page-1),30*page) let i = index\" [id]=\"s\" [index] = \"30*(page-1)+i+1\"\n    (disable)=\"user.submitted = onDisable($event, user.submitted);\" (listFull)=\"listFull = true\"></app-submission>\n  <tr *ngIf=\"ready && listFull && user.submitted.slice(30*page).length > 0\" style=\"height: 10px;\" align=\"left\"><td>\n    <a [routerLink]=\"[]\" [queryParams]=\"{p:page+1}\" routerLinkActive=\"active\">...more</a>\n  </td></tr>\n  <tr style=\"height: 10px;\"><td></td></tr>\n  <tr style=\"height: 2px;\"><td style=\"background-color: rgb(255, 102, 0);\"></td></tr>\n  <tr style=\"height: 50px;\"><td></td></tr>\n  </tbody>\n</table>\n"
