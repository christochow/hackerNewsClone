export default "<table *ngIf=\"ready\">\n  <tbody>\n  <app-row *ngIf=\"item.id\" [isCommentPage]=\"true\" [isJobs]=\"false\" [id]=\"item.id\"></app-row>\n  <tr class=\"main-row\" align=\"left\">\n    <td style=\"padding-left: 11px;padding-top: 10px\" [innerHTML]=\"item.text\"\n        *ngIf=\"item.text !== undefined\"></td>\n  </tr>\n  <app-poll *ngIf=\"item.id && isPoll\" [item]=\"item\"></app-poll>\n  <tr>\n    <td style=\"border-bottom: 0.5pt solid grey;\"></td>\n  </tr>\n  <tr class=\"separator\"></tr>\n  <tr app-comment *ngFor=\"let i of item.kids.slice(30*(page-1), 30*page)\" [depth]=\"0\" [id]=\"i\"\n      (onDisable)=\"item.kids = onDisable($event, item.kids)\"></tr>\n  <tr *ngIf=\"ready && item.kids.slice(30*(page)).length > 0\" style=\"height: 10px;\" align=\"left\">\n    <td>\n      <a [routerLink]=\"['../'+item.id]\" [queryParams]=\"{p:page+1}\" routerLinkActive=\"active\">...more</a>\n    </td>\n  </tr>\n  <tr style=\"height: 10px;\">\n    <td></td>\n  </tr>\n  <tr style=\"height: 2px;\">\n    <td style=\"background-color: rgb(255, 102, 0);\"></td>\n  </tr>\n  <tr style=\"height: 50px;\">\n    <td></td>\n  </tr>\n  </tbody>\n</table>\n"
