export default "<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" border=\"0\" *ngIf=\"ready\">\n  <tbody>\n  <app-row *ngFor=\"let s of stories.slice(30*(page-1), 30*page) let i = index\"\n           [id]=\"s\" [index]=\"30*(page-1)+i+1\" [isJobs]=\"isJobs\" [isCommentPage]=\"false\"\n           (disable)=\"stories = onDisable($event, stories)\" (listFull)=\"listFull = true;\">\n  </app-row>\n  <tr *ngIf=\"ready && listFull && stories.slice(30*(page)).length > 0\" style=\"height: 10px;\" align=\"left\">\n    <td>\n      <a [routerLink]=\"[]\" [queryParams]=\"{p:page+1}\" routerLinkActive=\"active\">...more</a>\n    </td>\n  </tr>\n  <tr style=\"height: 10px;\">\n    <td></td>\n  </tr>\n  <tr style=\"height: 2px;\">\n    <td style=\"background-color: rgb(255, 102, 0);\"></td>\n  </tr>\n  <tr style=\"height: 50px;\">\n    <td></td>\n  </tr>\n  </tbody>\n</table>\n"
