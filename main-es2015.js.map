export default "<div>\n  <tr align=\"left\" style=\"margin: 0\">\n    <td style=\"font-size: 15px\" *ngIf=\"submission.url === undefined\"  [style.padding-left]=\"index < 10? '8px' : '0'\">\n      {{index}}. <a [routerLink]=\"['../../../'+(isPoll?'poll/':'comments/')+submission.id]\" routerLinkActive=\"active\">{{submission.title}}</a>\n    </td>\n    <td style=\"font-size: 15px\" *ngIf=\"submission.url !== undefined\"   [style.padding-left]=\"index < 10? '8px' : '0'\">{{index}}. <a [href]=\"submission.url\" target=\"_blank\">{{submission.title}}</a></td>\n  </tr>\n  <tr align=\"left\" style=\"margin: 0;color: grey\">\n    <td>\n      <span style=\"padding-left: 25px;\">{{submission.score}} points by <a class=\"info-link\" [routerLink]=\"['../']\">{{submission.by}}</a></span>\n      <span>|</span>\n      <span style=\"margin: 2px\"><a class=\"info-link\" [href]=\"'https://www.google.com/search?q='+submission.title\" target=\"_blank\">web</a></span>\n      <span>|</span>\n      <span><a class=\"info-link\" [routerLink]=\"['../../../'+(isPoll?'poll/':'comments/')+submission.id]\" routerLinkActive=\"active\" [routerLinkActiveOptions]=\"{ exact: true }\">{{discuss}}</a></span>\n    </td>\n  </tr>\n</div>\n"
