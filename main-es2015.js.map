export default "<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" border=\"0\" *ngIf=\"ready\">\n  <tbody align=\"left\">\n  <tr><td width=\"10px;\">user: </td>  <td class=\"header\">{{user.id}}</td></tr>\n  <tr><td width=\"10px;\">karma:</td> <td class=\"header\">{{user.karma}}</td></tr>\n  <tr><td width=\"10px;\" valign=\"top\">about:</td> <td class=\"header\" [innerHTML]=\"user.about\"></td></tr>\n  <tr><td width=\"10px;\"></td> <td class=\"header\"><a [routerLink]=\"'submissions'\">submissions</a></td></tr>\n  <tr style=\"height: 10px;\"><td></td></tr>\n  <tr style=\"height: 2px;\"><td style=\"background-color: rgb(255, 102, 0);\"></td><td style=\"background-color: rgb(255, 102, 0);width: 100%\"></td></tr>\n  <tr style=\"height: 50px;\"><td></td></tr>\n  </tbody>\n</table>\n"
