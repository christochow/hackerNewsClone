export default "<tr *ngIf=\"!item.deleted\">\n  <td [width]=\"depth*50 + 'px'\"></td>\n  <td>\n    <table class=\"main-row\">\n      <tr class=\"table-row text\" align=\"left\"><a class=\"user\" [routerLink]=\"['../../user/'+item.by]\"\n                                                 routerLinkActive=\"active\">{{item.by}}</a></tr>\n      <tr class=\"text\" [innerHTML]=\"item.text\" align=\"left\"></tr>\n    </table>\n  </td>\n</tr>\n<table>\n  <tr app-comment *ngFor=\"let i of item.kids\" [depth]=\"depth+1\" [id]=\"i\"></tr>\n</table>\n"
