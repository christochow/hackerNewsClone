export default "<div [ngClass]=\"isCommentPage?['comment-row']:['main-row']\">\n  <tr align=\"left\">\n    <td *ngIf=\"isCommentPage\" width=\"2.5px\"></td>\n    <td *ngIf=\"!isCommentPage && new.url === undefined\" style=\"font-size: 15px\"\n        [style.padding-left]=\"index < 10? '8px' : '0'\">\n      {{index}}. <a [routerLink]=\"['../'+(isPoll?'poll/':'comments/')+new.id]\"\n                    routerLinkActive=\"active\">{{new.title}}</a>\n    </td>\n    <td *ngIf=\"!isCommentPage && new.url !== undefined\" style=\"font-size: 15px\"\n        [style.padding-left]=\"index < 10? '8px' : '0'\">\n      {{index}}. <a [href]=\"new.url\" target=\"_blank\">{{new.title}}</a>\n    </td>\n    <td *ngIf=\"isCommentPage && new.url === undefined\" style=\"font-size: 16px;\">\n      <a [routerLink]=\"[]\"\n         [queryParams]=\"{}\"\n         routerLinkActive=\"active\"\n         >{{new.title}}\n      </a>\n    </td>\n    <td *ngIf=\"isCommentPage && new.url !== undefined\" style=\"font-size: 16px;\">\n      <a [href]=\"new.url\" target=\"_blank\">{{new.title}}\n      </a>\n    </td>\n  </tr>\n  <tr *ngIf=\"isJobs\"><td class=\"job-row\"></td></tr>\n  <tr align=\"left\" class=\"info-row\" *ngIf=\"!isJobs\">\n    <td *ngIf=\"isCommentPage\" width=\"2.5px\"></td>\n    <td>\n      <span *ngIf=\"!isCommentPage\" class=\"normal-link\">\n        {{new.score}} points by <a class=\"info-row\"\n                                   [routerLink]=\"['../user/'+new.by]\"\n                                   routerLinkActive=\"active\">{{new.by}}</a>\n      </span>\n      <span *ngIf=\"isCommentPage\">\n        {{new.score}} points by <a class=\"info-row\" [routerLink]=\"['../../user/'+new.by]\"\n                                                             routerLinkActive=\"active\">\n        {{new.by}}</a>\n      </span>\n      <span *ngIf=\"new.url !== undefined\">|</span>\n      <span *ngIf=\"new.url !== undefined\" class=\"web-link\"><a class=\"info-row\" [href]=\"'https://www.google.com/search?q='+new.title\"\n                                               target=\"_blank\">web</a></span>\n      <span>|</span>\n      <span><a class=\"info-row\" [routerLink]=\"isCommentPage?[]:['../'+(isPoll?'poll/':'comments/')+new.id]\" routerLinkActive=\"active\"\n               [routerLinkActiveOptions]=\"{ exact: true }\">{{discuss}}</a></span>\n    </td>\n  </tr>\n</div>\n"
